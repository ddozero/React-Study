<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const obj = {
            name : "tihs개념",
            normalFunct : function(){ //obj 객체를 의미
                console.log ("normalFunc this.name: ", this);
            },
            normalFunct2 : function() {  
                console.log("부모 arrowFunc this.name: ", this); 
                const innerArrow = () =>{
                    console.log("자식 tihs innerArrow:", this);
                };
                innerArrow();

            },
            arrowFunct : () => {  //여기서 this는 obj this를 의미하는게 아니라 windows 객체를 의미, 화살표를 썼기 때문
                console.log("this arrowFunc this.name: ", this); 
            },
        };
        obj.normalFunct();
        obj.normalFunct2();
        obj.arrowFunct();
    </script>
</body>
</html>
